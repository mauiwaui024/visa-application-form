name: Deploy frontend and backend

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f backend/Dockerfile
          test -f frontend/Dockerfile
          test -f docker/docker-compose.prod.yml
          test -f frontend/docker/nginx.conf

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/visa_deploy_key
          chmod 600 ~/.ssh/visa_deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build backend image
        run: docker build -t visa-application-backend:${{ github.sha }} ./backend
        env:
          DOCKER_BUILDKIT: 1

      - name: Build frontend image
        run: docker build -t visa-application-frontend:${{ github.sha }} ./frontend
        env:
          DOCKER_BUILDKIT: 1

      - name: Save Docker images
        run: |
          docker save visa-application-backend:${{ github.sha }} | gzip > backend-image.tar.gz
          docker save visa-application-frontend:${{ github.sha }} | gzip > frontend-image.tar.gz

      - name: Generate .env for deploy
        run: |
          cat > .env <<EOF
          IMAGE_TAG=${{ github.sha }}
          BACKEND_PORT=${{ vars.BACKEND_PORT }}
          FRONTEND_PORT=${{ vars.FRONTEND_PORT }}

          HTTP_HOST=${{ vars.HTTP_HOST }}
          HTTP_PORT=${{ vars.HTTP_PORT }}
          HTTP_READ_TIMEOUT_SECONDS=${{ vars.HTTP_READ_TIMEOUT_SECONDS }}
          HTTP_WRITE_TIMEOUT_SECONDS=${{ vars.HTTP_WRITE_TIMEOUT_SECONDS }}

          DB_HOST=${{ vars.DB_HOST }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_SSLMODE=${{ vars.DB_SSLMODE }}
          DB_MAX_OPEN_CONNS=${{ vars.DB_MAX_OPEN_CONNS }}
          DB_MAX_IDLE_CONNS=${{ vars.DB_MAX_IDLE_CONNS }}
          DB_CONN_MAX_LIFETIME_SECONDS=${{ vars.DB_CONN_MAX_LIFETIME_SECONDS }}

          BACKGROUND_NAME=${{ vars.BACKGROUND_NAME }}
          BACKGROUND_SCHEDULE=${{ vars.BACKGROUND_SCHEDULE }}
          BACKGROUND_RETRY_DELAY_SECONDS=${{ vars.BACKGROUND_RETRY_DELAY_SECONDS }}
          BACKGROUND_OUTPUT_DIR=${{ vars.BACKGROUND_OUTPUT_DIR }}

          MAIL_ENABLED=${{ vars.MAIL_ENABLED }}
          MAIL_SMTP_HOST=${{ vars.MAIL_SMTP_HOST }}
          MAIL_SMTP_PORT=${{ vars.MAIL_SMTP_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_APP_PASSWORD=${{ secrets.MAIL_APP_PASSWORD }}
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          MAIL_TO=${{ secrets.MAIL_TO }}
          MAIL_SUBJECT_PREFIX=${{ vars.MAIL_SUBJECT_PREFIX }}
          EOF

      - name: Validate required values
        run: |
          required_keys=(
            "SSH_USER:${{ secrets.SSH_USER }}"
            "SERVER_HOST:${{ secrets.SERVER_HOST }}"
            "DB_USER:${{ secrets.DB_USER }}"
            "DB_PASSWORD:${{ secrets.DB_PASSWORD }}"
            "DB_NAME:${{ secrets.DB_NAME }}"
          )
          for pair in "${required_keys[@]}"; do
            key="${pair%%:*}"
            value="${pair#*:}"
            if [ -z "$value" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

      - name: Copy artifacts to server
        run: |
          ssh -i ~/.ssh/visa_deploy_key -o StrictHostKeyChecking=no "${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }}" "mkdir -p /opt/visa-application"
          scp -i ~/.ssh/visa_deploy_key -o StrictHostKeyChecking=no \
            backend-image.tar.gz \
            frontend-image.tar.gz \
            docker/docker-compose.prod.yml \
            .env \
            "${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }}:/opt/visa-application/"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/visa_deploy_key -o StrictHostKeyChecking=no "${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }}" "
            set -e
            cd /opt/visa-application

            docker load -i backend-image.tar.gz
            docker load -i frontend-image.tar.gz

            docker compose -f docker-compose.prod.yml --env-file .env down --remove-orphans 2>/dev/null || true
            docker compose -f docker-compose.prod.yml --env-file .env up -d

            sleep 10

            set -a
            . ./.env
            set +a

            curl -fsS \"http://localhost:\${BACKEND_PORT:-8080}/health\" > /dev/null
            curl -fsS \"http://localhost:\${FRONTEND_PORT:-80}/health\" > /dev/null
            curl -fsS \"http://localhost:\${FRONTEND_PORT:-80}/\" > /dev/null

            docker compose -f docker-compose.prod.yml ps
          "